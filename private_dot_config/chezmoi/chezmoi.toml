# Two chezmoi sources are in play:
#
#   ~/.local/share/chezmoi   (jpulec/dotfiles)
#     Personal config that should load cleanly on any platform. `chezmoi apply`
#     must succeed and fish must start without errors when run over SSH, on
#     macOS, on a non-Hyprland Linux box, etc. Files may reference graphical-
#     only tools (hyprctl, wl-copy, notify-send) inside lazy-loaded functions
#     or per-host conditionals -- presence is fine, but startup must not break.
#     This is where day-to-day iteration happens (fish, nvim, gitconfig, etc.).
#
#   ~/.local/share/griever   (jpulec/griever)
#     Arch + Hyprland bootstrap. Personal "Omarchy". Assumes specific packages
#     are installed (hyprland, foot, mako, walker, etc.). Touched rarely after
#     initial machine setup. Forkable in spirit but not maintained for others.
#
# Apply both via the chezmoi-hierarchical fish function, or:
#   chezmoi apply
#   chezmoi apply --source=~/.local/share/griever
#
# Drift indicator: the starship prompt shows ` !cz ` when either source has
# uncommitted local changes. Run `chezdiff` (or just `chezmoi diff` in each
# source) and `chezmoi re-add` to capture intended changes.

[diff]
  exclude = ["scripts"]
[merge]
  command = "nvim"
  args = ["-d", "{{ .Destination }}", "{{ .Source }}", "{{ .Target }}"]

# 1Password CLI integration. Enables template functions like
# `onepasswordRead "op://Vault/Item/field"` for embedding secret values into
# rendered files at chezmoi-apply time. Not currently used by any template
# (see opencode-server.fish.tmpl for the alternative pattern: fetch at runtime
# rather than embed at apply time -- preferred to avoid plaintext on disk).
[onepassword]
  command = "op"
  mode = "account"

# Personal data overrides. Defaults ship in the dotfiles repo's
# .chezmoidata.toml file -- only add entries here when this machine differs
# from those defaults.
#
# Example (uncomment to override):
#   [data]
#     ngrok_user = "different-handle"
#     op_account = "personal.1password.com"
#     op_vault   = "Private"
